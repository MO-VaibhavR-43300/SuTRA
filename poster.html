<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SuTRA Poster</title>
  <style>
    body {
      margin: 0;
      background: #0f172a;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
      color: #e2e8f0;
    }
    img {
      max-width: 100%;
      max-height: calc(100vh - 4rem);
      object-fit: contain;
    }
    a {
      position: fixed;
      top: 1rem;
      left: 1rem;
      color: #99f6e4;
      text-decoration: none;
      font-size: 0.95rem;
    }
    a:hover { text-decoration: underline; }
    .missing {
      padding: 2rem;
      text-align: center;
      max-width: 480px;
      line-height: 1.5;
    }
    .missing code {
      background: #1e293b;
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <a href="index.html">← Back to project page</a>
  <img src="images/sutra_poster.png" alt="SuTRA poster"
       onerror="this.style.display='none'; document.getElementById('poster-missing').style.display='block';">
  <div id="poster-missing" class="missing" style="display:none">
    <p>Poster not found. Add your poster image as <code>images/sutra_poster.png</code>.</p>
  </div>
</body>
</html>
